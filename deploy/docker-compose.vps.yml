services:
  docmost:
    image: ${WEB_IMAGE:?defina WEB_IMAGE}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_URL: ${APP_URL:?defina APP_URL}
      APP_SECRET: ${APP_SECRET:?defina APP_SECRET}
      DATABASE_URL: postgresql://docmost:${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}@db:5432/docmost
      REDIS_URL: redis://redis:6379
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    restart: unless-stopped
    volumes:
      - docmost:/app/data/storage
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "http://127.0.0.1:3000/api/health/live",
        ]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docmost -d docmost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory-policy",
        "noeviction",
      ]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  docmost:
  db_data:
  redis_data:
